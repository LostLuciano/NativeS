name: Build Native iOS

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: List Available SDKs
        run: xcodebuild -showsdks

      - name: Build iOS App No Codesign
        run: |
          set -o pipefail
          xcodebuild \
            -project MusicStemNative/MusicStemNative.xcodeproj \
            -scheme MusicStemNative \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee xcodebuild.log

      - name: Show Build Errors
        if: failure()
        run: |
          echo "===== LAST 200 LINES ====="
          tail -n 200 xcodebuild.log
          echo "===== ERRORS ====="
          grep -i "error:" xcodebuild.log || true
          echo "===== UNDEFINED SYMBOLS ====="
          grep -i "undefined symbol" xcodebuild.log || true
          echo "===== LINKER ERRORS ====="
          grep -i "ld:" xcodebuild.log || true

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log

      - name: Find Built App
        run: |
          echo "Searching built .app..."
          find build -name "*.app" -type d

      - name: Package App as Unsigned IPA
        run: |
          rm -rf Payload
          mkdir -p Payload

          APP_PATH=$(find build -name "MusicStemNative.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: MusicStemNative.app not found"
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          cp -R "$APP_PATH" Payload/
          zip -r MusicStemNative-unsigned.ipa Payload

          ls -lh MusicStemNative-unsigned.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicStemNative-unsigned-ipa
          path: MusicStemNative-unsigned.ipa
          retention-days: 30
          compression-level: 0

      - name: Upload IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MusicStemNative-unsigned.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Success" >> $GITHUB_STEP_SUMMARY
          echo "- **IPA**: MusicStemNative-unsigned.ipa" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: Unsigned IPA" >> $GITHUB_STEP_SUMMARY
          echo "- **Note**: Unsigned IPA cannot be installed normally on iPhone without signing." >> $GITHUB_STEP_SUMMARY
